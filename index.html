<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5a3318" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shop Keeper" />
  <link rel="apple-touch-icon" href="icon-192.png" />
<title>Shop Keeper</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8e2d8; }
:root {
  --wood: #5a3318; --tan: #b8924a; --tan-light: #ede0c4; --tan-dark: #7a5c2a;
  --green: #1a6b3a; --red: #b02020; --orange: #bf4800; --yellow: #8a6800;
  --bg: #f5f1eb; --bg2: #ece6d8; --bg3: #e0d8c8; --bg-card: #faf8f4;
  --border: rgba(90,51,24,0.15); --border2: rgba(90,51,24,0.28);
  --text: #1e1208; --text2: #4a3820; --text3: #7a6040;
  --radius: 10px; --radius-lg: 14px;
}
.app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; }

/* HEADER */
.header { background: var(--wood); color: #f5e8c8; padding: 16px 20px 14px; display: flex; align-items: center; gap: 10px; }
.header-back { background: none; border: none; color: #f5e8c8; font-size: 22px; cursor: pointer; padding: 0 4px; display: none; line-height: 1; }
.header-title { font-size: 20px; font-weight: 700; color: #f5e8c8; flex: 1; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: rgba(245,232,200,0.7); margin-top: 2px; }
.header-action { background: rgba(245,232,200,0.18); border: 1px solid rgba(245,232,200,0.3); border-radius: 8px; padding: 7px 14px; color: #f5e8c8; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* BOTTOM NAV */
#bottomNav { display: flex; border-top: 1px solid var(--border2); background: var(--bg-card); flex-shrink: 0; }
.bnav-item { flex: 1; padding: 12px 0 10px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); cursor: pointer; border-top: 2.5px solid transparent; margin-top: -1px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bnav-item .bnav-icon { font-size: 20px; line-height: 1; }
.bnav-item.active { color: var(--wood); border-top-color: var(--wood); }

/* DETAIL TABS */
.tab-bar { display: flex; border-bottom: 1px solid var(--border2); background: var(--bg-card); overflow-x: auto; padding: 0 8px; flex-shrink: 0; }
.tab { flex-shrink: 0; padding: 12px 14px; font-size: 13px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2.5px solid transparent; margin-bottom: -1px; white-space: nowrap; }
.tab.active { color: var(--wood); border-bottom-color: var(--wood); font-weight: 700; }
.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

/* BUTTONS */
.btn { border-radius: var(--radius); padding: 11px 18px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; }
.btn-primary { background: var(--wood); color: #f5e8c8; width: 100%; padding: 14px; }
.btn-secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border2); font-size: 14px; }
.btn-green { background: var(--green); color: #fff; }
.btn-icon { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px 6px; line-height: 1; }

/* FORMS */
input, select, textarea { width: 100%; border: 1px solid var(--border2); border-radius: var(--radius); padding: 11px 13px; font-size: 15px; color: var(--text); background: var(--bg-card); margin-bottom: 12px; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: 2px solid var(--tan); outline-offset: -1px; border-color: var(--tan); }
label { font-size: 13px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 5px; }
.row2 { display: flex; gap: 10px; }
.row2 > div { flex: 1; }
.prefix { position: relative; }
.prefix span { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; margin-top: -6px; font-weight: 600; }
.prefix input { padding-left: 24px; }
.slabel { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin: 22px 0 10px; }

/* STATUS PILL SELECT */
.status-select-wrap { position: relative; display: inline-block; }
.status-select-wrap select { appearance: none; -webkit-appearance: none; padding: 5px 28px 5px 11px; font-size: 12px; font-weight: 700; border-radius: 20px; border: none; cursor: pointer; margin: 0; width: auto; min-width: 120px; font-family: inherit; }
.status-select-wrap::after { content: '▾'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; pointer-events: none; }
.status-select-wrap.s-inquiry  select { background: #dde8f5; color: #1a3d6b; }
.status-select-wrap.s-quoted   select { background: #e8ddf5; color: #3d1a6b; }
.status-select-wrap.s-progress select { background: #d4eddc; color: #0d4d28; }
.status-select-wrap.s-declined select { background: #f5ddd8; color: #6b1a10; }
.status-select-wrap.s-complete select { background: #e0e0e0; color: #2a2a2a; }
.status-select-wrap.s-inquiry::after  { color: #1a3d6b; }
.status-select-wrap.s-quoted::after   { color: #3d1a6b; }
.status-select-wrap.s-progress::after { color: #0d4d28; }
.status-select-wrap.s-declined::after { color: #6b1a10; }
.status-select-wrap.s-complete::after { color: #2a2a2a; }

/* JOB CARDS */
.job-card { background: var(--bg-card); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 15px 16px; margin-bottom: 12px; cursor: pointer; border-left: 5px solid var(--tan); }
.job-card.urgent  { border-left-color: var(--red);    background: #fdf5f5; }
.job-card.warning { border-left-color: var(--orange);  background: #fdf7f2; }
.job-card.soon    { border-left-color: var(--yellow);  background: #fdf9ea; }
.job-card.ok      { border-left-color: var(--green); }
.job-card.archived { border-left-color: #999; opacity: 0.82; }
.job-title  { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
.job-client { font-size: 14px; font-weight: 500; color: var(--text2); margin-top: 3px; }
.job-due    { font-size: 13px; font-weight: 600; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
.job-due.urgent  { color: var(--red); }
.job-due.warning { color: var(--orange); }
.job-due.soon    { color: var(--yellow); }
.job-due.ok      { color: var(--green); }
.job-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.pill { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.pill-tan   { background: var(--tan-light); color: var(--tan-dark); }
.pill-green { background: #d4eddc; color: #0d4d28; }
.pill-gray  { background: #e4e4e4; color: #444; }
.prog-bar  { margin-top: 10px; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; }

/* ARCHIVE BANNER */
.archive-banner { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.archive-banner-icon { font-size: 22px; }
.archive-banner-text { font-size: 13px; font-weight: 500; color: var(--text2); }
.archive-banner-text strong { color: var(--text); font-weight: 700; }

/* CUT LIST */
.cut-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
.cut-row:last-child { border-bottom: none; }
.check-box { width: 22px; height: 22px; border: 2px solid var(--border2); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
.check-box.done { background: var(--wood); border-color: var(--wood); color: #f5e8c8; }

/* BF */
.bf-result { background: var(--tan-light); border-radius: var(--radius-lg); padding: 18px; text-align: center; margin-top: 14px; }
.bf-num  { font-size: 40px; font-weight: 800; color: var(--wood); }
.bf-unit { font-size: 14px; font-weight: 600; color: var(--tan-dark); margin-top: 2px; }

/* PHOTOS */
.photo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.photo-thumb { border-radius: var(--radius); overflow: hidden; position: relative; background: #000; cursor: pointer; }
.photo-thumb .photo-img-wrap { aspect-ratio: 1; overflow: hidden; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.15s; }
.photo-thumb:active img { opacity: 0.8; }
.photo-note-bar { padding: 5px 7px 6px; background: var(--bg2); font-size: 11px; font-weight: 500; color: var(--text2); line-height: 1.3; border-top: 1px solid var(--border); min-height: 28px; display: flex; align-items: center; }
.photo-note-bar.empty { color: var(--text3); font-style: italic; }
.photo-del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.65); color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
.photo-add { aspect-ratio: 1; border-radius: var(--radius); border: 2px dashed var(--border2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--text3); font-size: 12px; font-weight: 600; gap: 5px; background: var(--bg2); }
/* LIGHTBOX */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 500; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }
.lightbox-img-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; }
.lightbox-img-area img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px; }
.lightbox-bar { background: rgba(0,0,0,0.85); padding: 12px 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.lightbox-note { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius); padding: 10px 12px; font-size: 14px; color: #f5e8c8; font-family: inherit; resize: none; margin-bottom: 10px; }
.lightbox-note::placeholder { color: rgba(245,232,200,0.4); }
.lightbox-note:focus { outline: none; border-color: var(--tan); }
.lightbox-actions { display: flex; gap: 10px; }
.lightbox-close { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 20px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 24px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.lightbox-nav.prev { left: 8px; }
.lightbox-nav.next { right: 8px; }
.lightbox-counter { text-align: center; font-size: 12px; font-weight: 600; color: rgba(245,232,200,0.5); margin-bottom: 8px; }

/* ESTIMATE */
.est-header { background: var(--wood); color: #f5e8c8; padding: 14px 16px; font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.est-body { border: 1px solid var(--border2); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); margin-bottom: 20px; overflow: hidden; background: var(--bg-card); }
.cost-line { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 15px; }
.cost-line:last-child { border-bottom: none; }
.cost-line.total { font-weight: 700; font-size: 16px; background: var(--bg2); }
.cost-line.total span:last-child { color: var(--wood); }
.cost-line span:first-child { color: var(--text2); font-weight: 500; }
.mat-card { background: var(--bg-card); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
.labor-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
.labor-row:last-child { border-bottom: none; }

/* CALENDAR */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-nav button { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 7px 16px; font-size: 18px; cursor: pointer; color: var(--text); font-weight: 700; }
.cal-nav h3 { font-size: 17px; font-weight: 700; color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--text3); padding: 4px 0 8px; }
.cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; position: relative; font-size: 14px; font-weight: 500; color: var(--text); }
.cal-day:hover { background: var(--bg2); }
.cal-day.other-month { color: var(--text3); }
.cal-day.today { font-weight: 800; color: var(--wood); background: var(--tan-light); }
.cal-day .dots { display: flex; gap: 2px; position: absolute; bottom: 3px; }
.cal-day .dot { width: 5px; height: 5px; border-radius: 50%; }
.cal-job-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--radius); border: 1px solid var(--border2); margin-bottom: 10px; cursor: pointer; background: var(--bg-card); }
.cal-job-item .bar { width: 5px; border-radius: 3px; align-self: stretch; flex-shrink: 0; min-height: 38px; }
.cal-job-item .cj-name  { font-size: 15px; font-weight: 700; color: var(--text); }
.cal-job-item .cj-dates { font-size: 13px; font-weight: 500; color: var(--text2); margin-top: 2px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: flex-end; z-index: 200; max-width: 430px; margin: 0 auto; }
.modal { background: var(--bg); border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-height: 88vh; overflow-y: auto; }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: var(--text); }
.modal-btns { display: flex; gap: 10px; margin-top: 8px; }
.modal-btns .btn-secondary { flex: 1; }
.modal-btns .btn-primary { flex: 2; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chip { font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border2); cursor: pointer; color: var(--text2); background: var(--bg2); }
.chip:active { background: var(--tan-light); color: var(--tan-dark); }
.share-pre { background: var(--bg2); border-radius: var(--radius); padding: 14px; font-size: 12px; line-height: 1.7; color: var(--text); white-space: pre-wrap; font-family: monospace; max-height: 260px; overflow-y: auto; border: 1px solid var(--border2); margin-bottom: 14px; }
.copy-ok { font-size: 13px; font-weight: 600; color: var(--green); text-align: center; margin-top: 8px; height: 18px; }
.empty { text-align: center; padding: 48px 20px; color: var(--text2); font-size: 15px; font-weight: 500; }
.empty-icon { font-size: 38px; margin-bottom: 12px; }

/* GCAL SYNC */
.gcal-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border2); }
.gcal-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.gcal-dot.connected { background: var(--green); }
.gcal-dot.disconnected { background: var(--text3); }
.gcal-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
.gcal-status { font-size: 12px; font-weight: 600; color: var(--text2); flex: 1; }
.gcal-btn { font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg-card); color: var(--wood); cursor: pointer; }
.sync-pill { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 10px; background: #ddf0e8; color: #0d4d28; margin-left: 4px; vertical-align: middle; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<div class="app">
  <div class="header">
    <button class="header-back" id="backBtn" onclick="goBack()">&#8592;</button>
    <div style="flex:1">
      <div class="header-title" id="hTitle">Shop Keeper</div>
    </div>
    <button class="header-action" id="hAction" onclick="showAddJobModal()">+ Job</button>
  </div>
  <div class="gcal-bar" id="gcalBar">
    <div class="gcal-dot disconnected" id="gcalDot"></div>
    <div class="gcal-status" id="gcalStatus">Google Calendar — not connected</div>
    <button class="gcal-btn" id="gcalBtn" onclick="gcalConnect()">Connect</button>
  </div>

  <!-- ACTIVE JOBS -->
  <div id="viewList" style="flex:1;overflow-y:auto;display:flex;flex-direction:column">
    <div style="padding:16px;flex:1">
      <div class="slabel" style="margin-top:8px">Active Jobs</div>
      <div id="jobList"></div>
    </div>
  </div>

  <!-- ARCHIVE -->
  <div id="viewArchive" style="display:none;flex:1;overflow-y:auto;flex-direction:column">
    <div style="padding:16px;flex:1">
      <div class="archive-banner">
        <div class="archive-banner-icon">&#128230;</div>
        <div class="archive-banner-text">Jobs marked <strong>Complete</strong> or <strong>Not Accepted</strong> are automatically moved here.</div>
      </div>
      <div class="slabel" style="margin-top:4px">Archived Jobs</div>
      <div id="archiveList"></div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div id="viewCal" style="display:none;padding:16px;flex:1;overflow-y:auto">
    <div class="cal-nav">
      <button onclick="calPrev()">&#8249;</button>
      <h3 id="calMonth"></h3>
      <button onclick="calNext()">&#8250;</button>
    </div>
    <div style="text-align:right;margin-bottom:10px">
      <button class="gcal-btn" onclick="gcalSyncAll()" style="font-size:13px;padding:7px 16px">&#8635; Sync to Google Calendar</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div id="calJobList" style="margin-top:20px"></div>
  </div>

  <!-- JOB DETAIL -->
  <div id="viewDetail" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div class="tab-bar">
      <div class="tab active" onclick="sw('cutlist')">Cut List</div>
      <div class="tab" onclick="sw('boardfoot')">Board Feet</div>
      <div class="tab" onclick="sw('photos')">Photos</div>
      <div class="tab" onclick="sw('estimate')">Estimate</div>
    </div>
    <div style="flex:1;overflow-y:auto">
      <div id="tab-cutlist" class="tab-content active">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div style="font-size:14px;font-weight:600;color:var(--text2)" id="cutProg"></div>
          <button class="btn btn-secondary" onclick="showAddCutModal()" style="padding:8px 14px;font-size:13px">+ Add Cut</button>
        </div>
        <div id="cutList"></div>
      </div>
      <div id="tab-boardfoot" class="tab-content">
        <div class="slabel">Calculate board feet</div>
        <label>Species</label><input type="text" id="bfSpecies" placeholder="e.g. White Oak..."/>
        <div class="row2">
          <div><label>Thickness (in)</label><input type="number" id="bfT" placeholder="1.5" step="0.25"/></div>
          <div><label>Width (in)</label><input type="number" id="bfW" placeholder="6" step="0.5"/></div>
        </div>
        <div class="row2">
          <div><label>Length (ft)</label><input type="number" id="bfL" placeholder="8" step="0.5"/></div>
          <div><label>Qty</label><input type="number" id="bfQ" placeholder="1" min="1"/></div>
        </div>
        <button class="btn btn-primary" onclick="calcBF()">Calculate</button>
        <div class="bf-result" id="bfResult" style="display:none"></div>
        <div class="slabel">Saved calculations</div>
        <div id="bfLog"></div>
      </div>
      <div id="tab-photos" class="tab-content">
        <div class="slabel">Job photos</div>
        <div class="photo-grid" id="photoGrid"></div>
        <input type="file" id="photoInputCamera" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)"/>
        <input type="file" id="photoInputRoll" accept="image/*" multiple style="display:none" onchange="handlePhoto(event)"/>
      </div>
      <div id="tab-estimate" class="tab-content">
        <div id="estSummary"></div>
        <div class="slabel">Materials</div>
        <div id="matList"></div>
        <button class="btn btn-secondary" onclick="showAddMatModal()" style="width:100%;margin-bottom:4px">+ Add Material</button>
        <div class="slabel">Labor</div>
        <div style="margin-bottom:12px">
          <label>Hourly rate ($)</label>
          <div class="prefix"><span>$</span><input type="number" id="laborRate" placeholder="65" step="5" onchange="saveLaborRate()"/></div>
        </div>
        <div id="laborList"></div>
        <button class="btn btn-secondary" onclick="showAddLaborModal()" style="width:100%;margin-bottom:4px">+ Add Labor Entry</button>
        <div class="slabel">Markup & other</div>
        <div class="row2">
          <div><label>Markup (%)</label><input type="number" id="markupPct" placeholder="20" onchange="saveMarkup()"/></div>
          <div><label>Other ($)</label><div class="prefix"><span>$</span><input type="number" id="otherCosts" placeholder="0" onchange="saveOther()"/></div></div>
        </div>
        <textarea id="otherNotes" rows="2" placeholder="Hardware, finish, delivery..." onchange="saveOther()"></textarea>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottomNav">
    <div class="bnav-item active" onclick="showView('list')" id="nav-list">
      <span class="bnav-icon">&#127968;</span>Jobs
    </div>
    <div class="bnav-item" onclick="showView('archive')" id="nav-archive">
      <span class="bnav-icon">&#128230;</span>Archive
    </div>
    <div class="bnav-item" onclick="showView('cal')" id="nav-cal">
      <span class="bnav-icon">&#128197;</span>Calendar
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modalWrap" style="display:none;position:fixed;inset:0;z-index:200;max-width:430px;margin:0 auto" onclick="closeModalOuter(event)">
  <div class="modal-overlay" style="position:absolute;inset:0">
    <div class="modal" id="modalInner" onclick="event.stopPropagation()"></div>
  </div>
</div>

<script>
const WOOD_PRESETS=[
  {name:'Pine',price:4.5},{name:'Poplar',price:5},{name:'Hard Maple',price:8.5},
  {name:'White Oak',price:9},{name:'Red Oak',price:7.5},{name:'Cherry',price:10},
  {name:'Walnut',price:14},{name:'Ash',price:7},{name:'Mahogany',price:12},{name:'Teak',price:22}
];
const STATUS_OPTS=[
  {val:'inquiry', label:'New Inquiry',  cls:'s-inquiry',  archived:false},
  {val:'quoted',  label:'Quoted',       cls:'s-quoted',   archived:false},
  {val:'progress',label:'In Progress',  cls:'s-progress', archived:false},
  {val:'declined',label:'Not Accepted', cls:'s-declined', archived:true},
  {val:'complete',label:'Complete',     cls:'s-complete', archived:true}
];
function sInfo(v){ return STATUS_OPTS.find(s=>s.val===v)||STATUS_OPTS[0]; }
function isArchived(job){ const si=sInfo(job.status||'inquiry'); return si.archived; }

let jobs=[], currentJobId=null, calYear, calMonth, prevView='list';
const today=new Date(); today.setHours(0,0,0,0);
calYear=today.getFullYear(); calMonth=today.getMonth();

try{ jobs=JSON.parse(localStorage.getItem('wj_v6')||'[]'); }catch(e){ jobs=[]; }
function save(){ try{ localStorage.setItem('wj_v6',JSON.stringify(jobs)); }catch(e){} }
function getJob(){ return jobs.find(j=>j.id===currentJobId); }
function fmt(n){ return '$'+parseFloat(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function urgColor(u){ return u==='urgent'?'var(--red)':u==='warning'?'var(--orange)':u==='soon'?'var(--yellow)':'var(--green)'; }

function urgency(job){
  if(!job.dueDate||isArchived(job)) return null;
  const diff=Math.round((new Date(job.dueDate+'T00:00:00')-today)/86400000);
  if(diff<0||diff<=3) return 'urgent';
  if(diff<=7) return 'warning';
  if(diff<=14) return 'soon';
  return 'ok';
}
function urgLabel(job){
  if(!job.dueDate||isArchived(job)) return null;
  const due=new Date(job.dueDate+'T00:00:00');
  const diff=Math.round((due-today)/86400000);
  if(diff<0) return '&#9888; Overdue by '+Math.abs(diff)+'d';
  if(diff===0) return '&#9888; Due today!';
  if(diff===1) return '&#128308; Due tomorrow';
  if(diff<=3) return '&#128308; Due in '+diff+' days';
  if(diff<=7) return '&#9899; Due in '+diff+' days';
  if(diff<=14) return '&#128992; Due in '+diff+' days';
  return '&#9989; Due '+due.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function progPct(job){
  if(!job.startDate||!job.dueDate) return null;
  const s=new Date(job.startDate+'T00:00:00'), d=new Date(job.dueDate+'T00:00:00');
  const tot=d-s; if(tot<=0) return 100;
  return Math.max(0,Math.min(100,Math.round((today-s)/tot*100)));
}

function changeStatus(id,val,e){
  e.stopPropagation();
  const j=jobs.find(jb=>jb.id===id); if(!j) return;
  const wasArchived=isArchived(j);
  j.status=val;
  save();
  const nowArchived=isArchived(j);
  // Show toast if moving between states
  if(!wasArchived && nowArchived){
    showToast('Moved to Archive');
    if(j.gcalEventId){ gcalDeleteEvent(j.gcalEventId); j.gcalEventId=null; save(); }
  }
  if(wasArchived && !nowArchived){ showToast('Restored to Jobs'); gcalSyncJob(j); }
  if(!wasArchived && !nowArchived){ gcalSyncJob(j); }
  renderJobList();
  renderArchiveList();
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e1208;color:#f5e8c8;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;pointer-events:none;opacity:0;transition:opacity 0.2s;max-width:300px;text-align:center';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{ t.style.opacity='0'; },2000);
}

function statusSelectHtml(job){
  const si=sInfo(job.status||'inquiry');
  const opts=STATUS_OPTS.map(s=>`<option value="${s.val}"${s.val===si.val?' selected':''}>${s.label}</option>`).join('');
  return `<div class="status-select-wrap ${si.cls}" onclick="event.stopPropagation()"><select onchange="changeStatus('${job.id}',this.value,event)">${opts}</select></div>`;
}

function jobCardHtml(j, archived){
  const urg=urgency(j), lbl=urgLabel(j);
  const done=(j.cuts||[]).filter(c=>c.done).length, total=(j.cuts||[]).length;
  const bf=(j.bfLog||[]).reduce((s,b)=>s+b.bf,0);
  const photos=(j.photos||[]).length;
  const est=calcEst(j);
  const pct=progPct(j);
  const cardClass=archived?'archived':(urg||'');
  const si=sInfo(j.status||'inquiry');
  return `<div class="job-card ${cardClass}" onclick="openJob('${j.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1">
        <div class="job-title">${j.name}</div>
        ${j.client?`<div class="job-client">${j.client}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:2px;flex-shrink:0;margin-top:-2px">
        <button class="btn-icon" onclick="event.stopPropagation();event.preventDefault();showEditJobModal('${j.id}')" style="color:var(--text3);font-size:16px;padding:4px 6px" title="Edit job">&#9998;</button>
        <button class="btn-icon" onclick="event.stopPropagation();event.preventDefault();deleteJob('${j.id}')" style="color:var(--red);font-size:20px;font-weight:700;padding:4px 8px" title="Delete job">&#10005;</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px">
      ${statusSelectHtml(j)}
      ${lbl?`<div class="job-due ${urg||'ok'}" style="font-size:12px">${lbl}</div>`:''}
    </div>
    ${!archived&&pct!==null?`<div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${urg?urgColor(urg):'var(--green)'}"></div></div>`:''}
    ${j.notes?`<div style="font-size:13px;font-weight:500;color:var(--text2);margin-top:10px;padding:9px 12px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--tan);line-height:1.5">${j.notes}</div>`:''}
    <div class="job-pills">
      ${total?`<span class="pill ${archived?'pill-gray':'pill-tan'}">${done}/${total} cuts</span>`:''}
      ${bf>0?`<span class="pill ${archived?'pill-gray':'pill-tan'}">${bf.toFixed(1)} bf</span>`:''}
      ${photos?`<span class="pill ${archived?'pill-gray':'pill-tan'}">${photos} photo${photos>1?'s':''}</span>`:''}
      ${est.total>0?`<span class="pill ${archived?'pill-gray':'pill-green'}">${fmt(est.total)}</span>`:''}
    </div>
  </div>`;
}

// VIEWS
function showView(v){
  ['list','archive','cal','detail'].forEach(n=>{
    const el=document.getElementById('view'+n.charAt(0).toUpperCase()+n.slice(1));
    if(el) el.style.display='none';
  });
  const target=document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1));
  if(target){
    if(v==='detail'){ target.style.display='flex'; target.style.flexDirection='column'; target.style.flex='1'; target.style.overflow='hidden'; }
    else{ target.style.display='flex'; target.style.flexDirection='column'; }
  }
  document.getElementById('bottomNav').style.display=v==='detail'?'none':'flex';
  ['list','archive','cal'].forEach(n=>{ const el=document.getElementById('nav-'+n); if(el) el.classList.toggle('active',n===v); });
  if(v==='list') renderJobList();
  if(v==='archive') renderArchiveList();
  if(v==='cal') renderCal();
}

function openJob(id){
  currentJobId=id; const job=getJob();
  prevView=document.getElementById('nav-archive').classList.contains('active')?'archive':'list';
  document.getElementById('hTitle').textContent=job.name;
  document.getElementById('backBtn').style.display='block';
  document.getElementById('hAction').style.display='none';
  showView('detail'); sw('cutlist');
}
function goBack(){
  document.getElementById('hTitle').textContent='Shop Keeper';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('hAction').style.display='block';
  currentJobId=null;
  showView(prevView||'list');
}
function sw(tab){
  ['cutlist','boardfoot','photos','estimate'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  document.querySelectorAll('#viewDetail .tab').forEach((el,i)=>el.classList.toggle('active',['cutlist','boardfoot','photos','estimate'][i]===tab));
  if(tab==='cutlist') renderCutList();
  if(tab==='boardfoot') renderBFLog();
  if(tab==='photos') renderPhotos();
  if(tab==='estimate') renderEstimate();
}

function renderJobList(){
  const el=document.getElementById('jobList');
  const active=jobs.filter(j=>!isArchived(j));
  if(!active.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">&#128296;</div>No active jobs.<br>Tap + Job to get started.</div>`; return; }
  el.innerHTML=active.map(j=>jobCardHtml(j,false)).join('');
}
function renderArchiveList(){
  const el=document.getElementById('archiveList');
  const archived=jobs.filter(j=>isArchived(j));
  if(!archived.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">&#128230;</div>No archived jobs yet.<br>Completed and declined jobs will appear here.</div>`; return; }
  el.innerHTML=archived.map(j=>jobCardHtml(j,true)).join('');
}
function deleteJob(id){
  const j=jobs.find(jb=>jb.id===id); if(!j) return;
  document.getElementById('modalInner').innerHTML=`
    <div class="modal-title" style="font-size:18px">Delete Job?</div>
    <div style="font-size:15px;font-weight:500;color:var(--text2);margin-bottom:6px">"${j.name}"</div>
    <div style="font-size:14px;color:var(--text3);margin-bottom:24px">This will permanently remove the job and all its data. This cannot be undone.</div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn" style="flex:1;background:var(--red);color:#fff" onclick="confirmDeleteJob('${id}')">Delete</button>
    </div>`;
  openModal();
}
function confirmDeleteJob(id){
  const j=jobs.find(jb=>jb.id===id);
  if(j && j.gcalEventId) gcalDeleteEvent(j.gcalEventId);
  jobs=jobs.filter(j=>j.id!==id); save(); closeModal(); renderJobList(); renderArchiveList();
}

// CALENDAR — show active jobs only on main dots, all in list
function renderCal(){
  document.getElementById('calMonth').textContent=new Date(calYear,calMonth,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const dotMap={};
  jobs.filter(j=>!isArchived(j)).forEach(j=>{
    const urg=urgency(j); const c=urg?urgColor(urg):'var(--tan)';
    [j.startDate,j.dueDate].forEach(d=>{ if(d){ if(!dotMap[d]) dotMap[d]=[]; dotMap[d].push(c); } });
  });
  let html='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{ html+=`<div class="cal-dow">${d}</div>`; });
  let day=1;
  for(let i=0;i<42;i++){
    let d,mo,yr,other=false;
    if(i<firstDay){ d=daysInPrev-(firstDay-i-1); mo=calMonth-1; yr=calYear; other=true; }
    else if(day>daysInMonth){ d=day-daysInMonth; mo=calMonth+1; yr=calYear; other=true; day++; }
    else{ d=day; mo=calMonth; yr=calYear; day++; }
    const rMo=(mo+12)%12, rYr=mo<0?yr-1:mo>11?yr+1:yr;
    const ds=`${rYr}-${String(rMo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=d===today.getDate()&&rMo===today.getMonth()&&rYr===today.getFullYear();
    const dots=(dotMap[ds]||[]).slice(0,3).map(c=>`<div class="dot" style="background:${c}"></div>`).join('');
    html+=`<div class="cal-day${other?' other-month':''}${isToday?' today':''}" onclick="calDayClick('${ds}')">${d}${dots?`<div class="dots">${dots}</div>`:''}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  renderCalJobs(null);
}
function renderCalJobs(fd){
  const el=document.getElementById('calJobList');
  const activeJobs=jobs.filter(j=>!isArchived(j));
  const list=fd?activeJobs.filter(j=>j.startDate===fd||j.dueDate===fd):activeJobs;
  if(!list.length){ el.innerHTML=fd?`<div style="font-size:14px;font-weight:500;color:var(--text2);padding:10px 0">No active jobs on this date.</div>`:''; return; }
  el.innerHTML=(fd?`<div class="slabel">Jobs on ${fd}</div>`:`<div class="slabel">Active jobs this month</div>`)+
  list.map(j=>{
    const urg=urgency(j); const c=urg?urgColor(urg):'var(--tan)';
    const pct=progPct(j);
    const sf=j.startDate?new Date(j.startDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    const df=j.dueDate?new Date(j.dueDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    return `<div class="cal-job-item" onclick="openJob('${j.id}')">
      <div class="bar" style="background:${c}"></div>
      <div style="flex:1">
        <div class="cj-name">${j.name}</div>
        <div class="cj-dates">${sf} → ${df}</div>
        ${pct!==null?`<div class="prog-bar" style="margin-top:6px"><div class="prog-fill" style="width:${pct}%;background:${c}"></div></div>`:''}
      </div>
      <div style="font-size:22px;color:var(--text3)">›</div>
    </div>`;
  }).join('');
}
function calDayClick(ds){ renderCalJobs(ds); }
function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

// CUT LIST
function renderCutList(){
  const j=getJob(); const cuts=j.cuts||[];
  document.getElementById('cutProg').textContent=cuts.length?`${cuts.filter(c=>c.done).length} of ${cuts.length} completed`:'No cuts yet';
  const el=document.getElementById('cutList');
  if(!cuts.length){ el.innerHTML=`<div class="empty" style="padding:28px 0">Add your first cut to get started.</div>`; return; }
  el.innerHTML=cuts.map((c,i)=>`
    <div class="cut-row">
      <div class="check-box ${c.done?'done':''}" onclick="toggleCut(${i})">${c.done?'&#10003;':''}</div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:600;color:var(--text);${c.done?'text-decoration:line-through;opacity:0.45':''}">${c.label}</div>
        <div style="font-size:13px;font-weight:500;color:var(--text2)">${c.t}" × ${c.w}" × ${c.l}"${c.qty>1?' ×'+c.qty:''}${c.material?' · '+c.material:''}</div>
      </div>
      <button class="btn-icon" onclick="deleteCut(${i})">&#10005;</button>
    </div>`).join('');
}
function toggleCut(i){ const j=getJob(); j.cuts[i].done=!j.cuts[i].done; save(); renderCutList(); }
function deleteCut(i){ const j=getJob(); j.cuts.splice(i,1); save(); renderCutList(); }

// BOARD FEET
function calcBF(){
  const t=parseFloat(document.getElementById('bfT').value)||0;
  const w=parseFloat(document.getElementById('bfW').value)||0;
  const l=parseFloat(document.getElementById('bfL').value)||0;
  const q=parseFloat(document.getElementById('bfQ').value)||1;
  const sp=document.getElementById('bfSpecies').value.trim();
  if(!t||!w||!l){ alert('Enter all dimensions.'); return; }
  const bf=(t*w*(l*12))/144*q;
  const r=document.getElementById('bfResult');
  r.style.display='block';
  r.innerHTML=`<div class="bf-num">${bf.toFixed(2)}</div><div class="bf-unit">board feet${sp?' of '+sp:''}</div>`;
  const j=getJob(); if(!j.bfLog) j.bfLog=[];
  j.bfLog.unshift({species:sp,t,w,l,q,bf:parseFloat(bf.toFixed(2)),date:new Date().toLocaleDateString()});
  save(); renderBFLog();
}
function renderBFLog(){
  const j=getJob(); const log=j.bfLog||[];
  const el=document.getElementById('bfLog');
  if(!log.length){ el.innerHTML=`<div style="color:var(--text3);font-size:14px;font-weight:500">No calculations yet.</div>`; return; }
  const total=log.reduce((s,b)=>s+b.bf,0);
  el.innerHTML=`<div style="margin-bottom:10px;font-size:14px;font-weight:700;color:var(--text2)">Total: ${total.toFixed(2)} bf</div>`+
  log.map((b,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
    <div>
      <div style="font-size:15px;font-weight:700;color:var(--text)">${b.species||'Unspecified'}</div>
      <div style="font-size:12px;font-weight:500;color:var(--text2)">${b.t}" × ${b.w}" × ${b.l}' × ${b.q} · ${b.date}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:16px;font-weight:800;color:var(--wood)">${b.bf.toFixed(2)} <span style="font-size:12px;color:var(--tan-dark)">bf</span></span>
      <button class="btn-icon" onclick="deleteBF(${i})">&#10005;</button>
    </div>
  </div>`).join('');
}
function deleteBF(i){ const j=getJob(); j.bfLog.splice(i,1); save(); renderBFLog(); }

// PHOTOS
function renderPhotos(){
  const j=getJob(); const photos=j.photos||[];
  let html=photos.map((p,i)=>{
    const src=typeof p==='object'?p.src:p;
    const note=typeof p==='object'?p.note:'';
    return `<div class="photo-thumb" onclick="openLightbox(${i})">
      <button class="photo-del" onclick="event.stopPropagation();deletePhoto(${i})">&#10005;</button>
      <div class="photo-img-wrap"><img src="${src}" loading="lazy"/></div>
      <div class="photo-note-bar ${note?'':'empty'}">${note||'Tap to add note'}</div>
    </div>`;
  }).join('');
  html+=`
    <div class="photo-add" onclick="document.getElementById('photoInputCamera').click()" style="flex-direction:column;gap:4px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/><path d="M8 6l2-3h4l2 3"/></svg>
      <span>Camera</span>
    </div>
    <div class="photo-add" onclick="document.getElementById('photoInputRoll').click()" style="flex-direction:column;gap:4px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <span>Library</span>
    </div>`;
  document.getElementById('photoGrid').innerHTML=html;
}
function handlePhoto(e){
  const files=Array.from(e.target.files); if(!files.length) return;
  const j=getJob(); if(!j.photos) j.photos=[];
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      j.photos.unshift({src:ev.target.result, note:'', date:new Date().toLocaleDateString()});
      loaded++;
      if(loaded===files.length){ save(); renderPhotos(); if(files.length===1) openLightbox(0); }
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
}
function deletePhoto(i){
  const j=getJob(); j.photos.splice(i,1); save(); renderPhotos();
}

// LIGHTBOX
let _lbIdx=0;
function openLightbox(i){
  const j=getJob(); const photos=j.photos||[];
  if(!photos.length) return;
  _lbIdx=i;
  let lb=document.getElementById('lightbox');
  if(!lb){ lb=document.createElement('div'); lb.id='lightbox'; lb.className='lightbox'; document.body.appendChild(lb); }
  renderLightbox();
  lb.style.display='flex';
}
function renderLightbox(){
  const j=getJob(); const photos=j.photos||[];
  const p=photos[_lbIdx]; if(!p) return;
  const src=typeof p==='object'?p.src:p;
  const note=typeof p==='object'?(p.note||''):'';
  const lb=document.getElementById('lightbox');
  lb.innerHTML=`
    <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
    ${photos.length>1?`<button class="lightbox-nav prev" onclick="lbNav(-1)">&#8249;</button><button class="lightbox-nav next" onclick="lbNav(1)">&#8250;</button>`:''}
    <div class="lightbox-img-area"><img src="${src}" /></div>
    <div class="lightbox-bar">
      <div class="lightbox-counter">${_lbIdx+1} of ${photos.length}${p.date?' · '+p.date:''}</div>
      <textarea class="lightbox-note" rows="2" placeholder="Add a note about this photo..." onchange="savePhotoNote(this.value)">${note.replace(/</g,'&lt;')}</textarea>
      <div class="lightbox-actions">
        <button class="btn btn-secondary" style="flex:1;font-size:13px" onclick="deletePhotoFromLightbox()">&#128465; Delete</button>
        <button class="btn btn-primary" style="flex:2;font-size:13px;padding:11px" onclick="savePhotoNoteBtn()">Save Note</button>
      </div>
    </div>`;
}
function lbNav(dir){
  const j=getJob(); const photos=j.photos||[];
  _lbIdx=(_lbIdx+dir+photos.length)%photos.length;
  renderLightbox();
}
function savePhotoNote(val){
  const j=getJob(); if(!j.photos[_lbIdx]) return;
  if(typeof j.photos[_lbIdx]==='string') j.photos[_lbIdx]={src:j.photos[_lbIdx],note:'',date:''};
  j.photos[_lbIdx].note=val; save();
}
function savePhotoNoteBtn(){
  const ta=document.querySelector('.lightbox-note'); if(!ta) return;
  savePhotoNote(ta.value);
  showToast('Note saved');

// ESTIMATE
function calcEst(job){
  const matTotal=(job.materials||[]).reduce((s,m)=>s+(m.bf*m.pricePerBf),0);
  const rate=parseFloat(job.laborRate||65);
  const laborTotal=(job.labor||[]).reduce((s,l)=>s+(l.hours*rate),0);
  const other=parseFloat(job.otherCosts||0);
  const sub=matTotal+laborTotal+other;
  const markup=sub*(parseFloat(job.markupPct||0)/100);
  return {matTotal,laborTotal,other,sub,markup,total:sub+markup,rate};
}

// SHARE
function buildShareText(job){
  const e=calcEst(job); const si=sInfo(job.status||'inquiry');
  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const lines=['═══════════════════════════','  ESTIMATE','═══════════════════════════','Job:    '+job.name];
  if(job.client) lines.push('Client: '+job.client);
  lines.push('Status: '+si.label);
  if(job.startDate) lines.push('Start:  '+job.startDate);
  if(job.dueDate)   lines.push('Due:    '+job.dueDate);
  lines.push('');
  if((job.materials||[]).length){
    lines.push('MATERIALS','───────────────────────────');
    (job.materials||[]).forEach(m=>{ lines.push('  '+m.name.padEnd(16)+fmt(m.bf*m.pricePerBf)); lines.push('  ('+m.bf.toFixed(2)+' bf @ '+fmt(m.pricePerBf)+'/bf)'); });
    lines.push('  Subtotal         '+fmt(e.matTotal),'');
  }
  if((job.labor||[]).length){
    lines.push('LABOR  (@ '+fmt(e.rate)+'/hr)','───────────────────────────');
    (job.labor||[]).forEach(l=>{ lines.push('  '+l.desc.padEnd(16)+fmt(l.hours*e.rate)); lines.push('  ('+l.hours+' hrs)'); });
    lines.push('  Subtotal         '+fmt(e.laborTotal),'');
  }
  if(e.other>0){ lines.push('OTHER COSTS','───────────────────────────','  Other             '+fmt(e.other),''); }
  lines.push('───────────────────────────');
  if(parseFloat(job.markupPct||0)>0){ lines.push('Subtotal            '+fmt(e.sub),'Markup ('+job.markupPct+'%)       '+fmt(e.markup)); }
  lines.push('TOTAL               '+fmt(e.total),'═══════════════════════════');
  if((job.cuts||[]).length){
    lines.push('','CUT LIST','───────────────────────────');
    (job.cuts||[]).forEach(c=>{ lines.push((c.done?'[x] ':'[ ] ')+c.label+(c.material?' ('+c.material+')':'')); lines.push('    '+c.t+'" x '+c.w+'" x '+c.l+'"'+(c.qty>1?' x'+c.qty:'')); });
  }
  lines.push('','Generated '+date);
  return lines.join('\n');
}

// ── GOOGLE CALENDAR SYNC ──────────────────────────────────────────
const GCAL_CLIENT_ID = '613511921628-8432fenppk3k3f7va6cfmetkilrq7n9r.apps.googleusercontent.com';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.events';
const GCAL_CALENDAR_ID = 'primary';
let gcalToken = null;
let gcalTokenExpiry = 0;

// Persist token across page reloads
try {
  const stored = JSON.parse(localStorage.getItem('gcal_token') || 'null');
  if (stored && stored.expiry > Date.now()) { gcalToken = stored.token; gcalTokenExpiry = stored.expiry; }
} catch(e) {}

function gcalSaveToken(token, expiresIn) {
  gcalToken = token;
  gcalTokenExpiry = Date.now() + (expiresIn - 60) * 1000;
  try { localStorage.setItem('gcal_token', JSON.stringify({token, expiry: gcalTokenExpiry})); } catch(e) {}
}
function gcalClearToken() {
  gcalToken = null; gcalTokenExpiry = 0;
  try { localStorage.removeItem('gcal_token'); } catch(e) {}
}
function gcalIsConnected() { return gcalToken && Date.now() < gcalTokenExpiry; }

function gcalUpdateUI() {
  const dot = document.getElementById('gcalDot');
  const status = document.getElementById('gcalStatus');
  const btn = document.getElementById('gcalBtn');
  if (!dot) return;
  if (gcalIsConnected()) {
    dot.className = 'gcal-dot connected';
    status.textContent = 'Google Calendar — connected';
    btn.textContent = 'Disconnect';
    btn.onclick = gcalDisconnect;
  } else {
    dot.className = 'gcal-dot disconnected';
    status.textContent = 'Google Calendar — not connected';
    btn.textContent = 'Connect';
    btn.onclick = gcalConnect;
  }
}

function gcalConnect() {
  if (typeof google === 'undefined' || !google.accounts) {
    showToast('Google sign-in not loaded yet, try again');
    return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPE,
    callback: (resp) => {
      if (resp.error) { showToast('Sign-in failed: ' + resp.error); return; }
      gcalSaveToken(resp.access_token, resp.expires_in);
      gcalUpdateUI();
      showToast('Connected to Google Calendar!');
      gcalSyncAll();
    }
  });
  client.requestAccessToken();
}

function gcalDisconnect() {
  if (gcalToken && typeof google !== 'undefined') {
    try { google.accounts.oauth2.revoke(gcalToken, ()=>{}); } catch(e) {}
  }
  gcalClearToken();
  gcalUpdateUI();
  showToast('Disconnected from Google Calendar');
}

// Sync a single job — create or update its calendar event
async function gcalSyncJob(job) {
  if (!gcalIsConnected()) return;
  if (!job.startDate && !job.dueDate) return;
  if (isArchived(job)) return;

  const si = sInfo(job.status || 'inquiry');
  const colorId = job.status === 'progress' ? '2'  // green
    : job.status === 'quoted'   ? '3'  // mauve/purple
    : job.status === 'inquiry'  ? '7'  // peacock/teal
    : '1'; // lavender default

  const start = job.startDate || job.dueDate;
  const end = job.dueDate || job.startDate;

  const event = {
    summary: `[SK] ${job.name}`,
    description: [
      job.client ? `Client: ${job.client}` : '',
      `Status: ${si.label}`,
      job.notes ? `Notes: ${job.notes}` : '',
      `\nManaged by Shop Keeper`
    ].filter(Boolean).join('\n'),
    start: { date: start },
    end: { date: end },
    colorId,
    extendedProperties: { private: { shopKeeperId: job.id } }
  };

  try {
    if (job.gcalEventId) {
      // Update existing
      const r = await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/${GCAL_CALENDAR_ID}/events/${job.gcalEventId}`,
        { method: 'PUT', headers: { Authorization: `Bearer ${gcalToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(event) }
      );
      if (r.status === 404) {
        // Event was deleted externally — create fresh
        delete job.gcalEventId; await gcalSyncJob(job); return;
      }
      if (!r.ok) throw new Error(await r.text());
    } else {
      // Create new
      const r = await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/${GCAL_CALENDAR_ID}/events`,
        { method: 'POST', headers: { Authorization: `Bearer ${gcalToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(event) }
      );
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      job.gcalEventId = data.id;
    }
    save();
  } catch(e) {
    console.warn('GCal sync error:', e);
  }
}

async function gcalDeleteEvent(eventId) {
  if (!gcalIsConnected() || !eventId) return;
  try {
    await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${GCAL_CALENDAR_ID}/events/${eventId}`,
      { method: 'DELETE', headers: { Authorization: `Bearer ${gcalToken}` } }
    );
  } catch(e) {}
}

async function gcalSyncAll() {
  if (!gcalIsConnected()) return;
  const dot = document.getElementById('gcalDot');
  const status = document.getElementById('gcalStatus');
  if (dot) dot.className = 'gcal-dot syncing';
  if (status) status.textContent = 'Syncing…';
  const active = jobs.filter(j => !isArchived(j) && (j.startDate || j.dueDate));
  for (const j of active) { await gcalSyncJob(j); }
  gcalUpdateUI();
  showToast(`Synced ${active.length} job${active.length !== 1 ? 's' : ''} to Google Calendar`);
}
